version: '3.8'

services:
  people-queue:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-1337}:1337"
    environment:
      - NODE_ENV=production
      - GOOGLE_SHEETS_CREDENTIALS=${GOOGLE_SHEETS_CREDENTIALS}
      - GOOGLE_SHEET_ID=${GOOGLE_SHEET_ID}
      - GOOGLE_SHEET_NAME=${GOOGLE_SHEET_NAME:-Form Responses 1}
